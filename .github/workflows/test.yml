name: Run Tests

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
          POSTGRES_DB: asgn2
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      # Optional but helps avoid DB timing issues
      - name: Wait for PostgreSQL
        run: sleep 5

      - name: Run tests
        run: npm test
        env:
          DB_HOST: localhost
          DB_USER: postgres
          DB_PASS: root
          DB_NAME: asgn2
          NODE_ENV: test